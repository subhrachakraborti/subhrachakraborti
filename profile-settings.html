<!DOCTYPE html>
<head><title>Profile Settings</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<style class="text/css">
	.Prl-set-up {
    background: #C0C0C0;
    width: 700px;
    border-radius: 5px;
    margin: 0 auto;
    display: table;
    padding: 15px 30px 30px ;
    box-sizing: border-box; 
	box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.05), 0 6px 20px 0 rgba(0, 0, 0, 0.09)
	margin-top: 6%;
	margin-bottom:15px;
}
	.A {
	float: center;
  width: 100%;
  margin: 0 0 15px;
  position: relative;
  margin-left: 20%;
	}
.btn{
  background: #0073ff;
  padding: 11px 50px;
  color: #fff;
  text-align: center;
  margin: 0 auto;
  font-size: 16px;
  width: 50%;
  height: 56px;
  cursor: pointer;
  position: center;
  margin-left: 17%;
	}
</head>
<body><div class=prl-set-up>
<div class=A><label>Display Name : </label>
<input type=name placeholder="Display Name" required></div>
<br>
<div class=A><label>Username : </label>
<input type=text placeholder="Username" min=10 required></div>
<br>
<div class=A><label>Your Profile Picture : </label>
<input type=files placeholder="Choose Image" optional></div>
<br>
<div class=A><label>Your Profile Background : </label>
<input type=files placeholder="Choose Image" optional></div>
<br>
<div class=btn><p align="right"><button class="Continue-btn">Continue</button></p></div>
</div>hi
</body>
</html>
